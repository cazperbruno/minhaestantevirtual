<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
    <meta name="theme-color" content="#e11d29" />
    <title>Readify — Sua biblioteca pessoal</title>
    <meta name="description" content="Descubra, organize e celebre seus livros. Readify é o app definitivo para leitores apaixonados.">
    <meta name="author" content="Readify" />
    <link rel="canonical" href="/" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!--
      Content Security Policy (camada extra de defesa contra XSS).
      - default-src 'self': qualquer recurso desconhecido é bloqueado.
      - 'unsafe-inline'/'unsafe-eval' em script-src: necessário para Vite + Lovable tagger
        em dev e para alguns chunks dinâmicos. Em produção apenas o bundle hashed roda.
      - img-src amplo: capas vêm de muitas fontes (Google Books, Open Library, AniList...).
      - connect-src: Supabase + WebSockets de Realtime + Lovable Cloud.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.lovable.app https://*.lovableproject.com https://*.lovable.dev;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' data: https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      media-src 'self' blob:;
      connect-src 'self' https: wss: blob:;
      worker-src 'self' blob:;
      frame-src 'self' https://*.lovable.app https://*.lovableproject.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    ">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(), geolocation=(), payment=()">

    <!-- PWA / iOS Add to Home Screen -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Readify" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <meta property="og:type" content="website" />

    <meta name="twitter:description" content="Descubra, organize e celebre seus livros. Readify é o app definitivo para leitores apaixonados.">

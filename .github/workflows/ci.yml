name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs duplicados na mesma branch/PR — economiza minutos do GitHub Actions.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, test e build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache do diretório global de pacotes do Bun + node_modules.
      # Chave principal = hash do bun.lock → invalida quando deps mudam.
      # restore-keys garante reuso parcial entre branches/PRs.
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        # Não falha o build no lint (warnings de estilo) — só reporta.
        continue-on-error: true

      - name: Run tests
        run: bun run test

      - name: Build (smoke check)
        run: bun run build
        env:
          # Build do Vite precisa das envs públicas do Supabase.
          # Configure esses secrets em: GitHub repo → Settings → Secrets and variables → Actions
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
